<div class="row">

    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-0 py-3">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0">Lista de Repositorios</h5>
                </div>
                @for (repository of (repositories$ | async); track repository.id) {
                <div class="list-group-item sidebar-item py-3" [routerLink]="['/repositories', repository.id]" routerLinkActive="active-item" [routerLinkActiveOptions]="{exact: true}" style="cursor: pointer;">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <h6 class="mb-0 text-primary">{{repository.name}}</h6>
                        <span class="badge bg-warning text-dark">★ {{repository.stars}}</span>
                    </div>
                    <small class="text-muted">{{repository.language}} • Creado: {{repository.createdAt}}</small>
                </div>
                }
                @empty {
                <div class="list-group-item py-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <h6 class="mb-0 text-primary">Error en la consulta de repositorios.</h6>
                    </div>
                    <small class="text-muted">Por favor, inténtelo de nuevo más tarde.</small>
                </div>
                }
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="sticky-detail">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
